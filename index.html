<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فعالية الملكية الفكرية</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="card">

  <h1>
    <span class="light">فعالية</span>
    <span class="main">الملكية الفكرية</span>
  </h1>

  <p class="subtitle">ارفع صورتك وسيتم تطبيق القالب عليها</p>

  <label class="upload-btn">
    اختر صورة
    <input type="file" id="upload">
  </label>

  <br><br>

  <!-- 🔥 هذا هو القالب النهائي -->
  <div id="canvas">

    <div class="image-box">
      <img id="finalImage">
    </div>

    <div class="frame"></div>

  </div>

  <br>

  <button class="upload-btn" onclick="downloadImage()">
    تحميل الصورة
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
