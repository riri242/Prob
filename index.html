<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فعالية الملكية الفكرية</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<!-- شاشة الرفع -->
<div class="upload-screen" id="uploadScreen">

  <div class="card">

    <h1>
      <span class="main">تيك برو توك</span>
    </h1>

    <p class="subtitle">أضف إطار الفعالية لصورتك</p>

    <label class="btn">
      اختر صورة
      <input type="file" id="upload">
    </label>

  </div>

</div>

<!-- شاشة القالب -->
<div class="editor-screen hidden" id="editorScreen">

  <div id="canvas" class="canvas">

    <img id="finalImage" />

    <div class="overlay"></div>

  </div>

  <button class="btn" onclick="downloadImage()">
    تحميل الصورة
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
