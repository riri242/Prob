<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>فعالية الملكية الفكرية</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/cropperjs/dist/cropper.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

  <h1>
    <span class="light">فعالية</span>
    <span class="main">الملكية الفكرية</span>
  </h1>

  <p class="subtitle">أضف إطار الفعالية لصورتك</p>

  <label class="upload-btn">
    اختر صورة
    <input type="file" id="upload">
  </label>

  <br><br>

  <img id="cropImage" style="max-width:100%; display:none;">

  <br>

  <button onclick="applyCrop()" class="upload-btn">قص الصورة</button>

  <button onclick="download()" class="upload-btn">تحميل</button>

  <br><br>

  <img id="finalImage" style="max-width:100%; border-radius:10px;">

</div>

<script src="https://unpkg.com/cropperjs/dist/cropper.js"></script>
<script src="script.js"></script>

</body>
</html>
